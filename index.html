<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dudurukan</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f172a;
        color: #f8fafc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 2rem;
        background:
          radial-gradient(circle at top left, rgba(56, 189, 248, 0.25), transparent 32rem),
          radial-gradient(circle at bottom right, rgba(168, 85, 247, 0.2), transparent 28rem),
          #0f172a;
      }

      main {
        width: min(100%, 760px);
        padding: clamp(2rem, 6vw, 4rem);
        border: 1px solid rgba(148, 163, 184, 0.25);
        border-radius: 28px;
        background: rgba(15, 23, 42, 0.72);
        box-shadow: 0 24px 80px rgba(2, 6, 23, 0.5);
        backdrop-filter: blur(18px);
      }

      p.kicker {
        margin: 0 0 1rem;
        color: #38bdf8;
        font-size: 0.85rem;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(3rem, 12vw, 6.5rem);
        line-height: 0.9;
        letter-spacing: -0.08em;
      }

      p.description {
        max-width: 34rem;
        margin: 1.5rem 0 0;
        color: #cbd5e1;
        font-size: clamp(1rem, 2vw, 1.2rem);
        line-height: 1.7;
      }

      .panel {
        margin-top: 2rem;
        padding: 1rem 1.25rem;
        border-radius: 18px;
        background: rgba(15, 23, 42, 0.72);
        color: #e2e8f0;
        border: 1px solid rgba(148, 163, 184, 0.18);
      }

      .panel strong {
        color: #f8fafc;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="kicker">GitHub import ready</p>
      <h1>dudurukan</h1>
      <p class="description">
        This Replit project has been configured with a minimal static website so the imported repository is runnable and visible in the preview.
      </p>
      <div class="panel">
        <strong>Status:</strong> serving static files on port 5000.
      </div>
    </main>
  </body>
</html>
